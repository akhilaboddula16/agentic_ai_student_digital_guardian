databases:
  - name: student-digital-guardian-db
    plan: free

services:
  - type: web
    name: student-digital-guardian-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-digital-guardian-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: TOKEN_TTL_MINUTES
        sync: false
      - key: REGISTRATION_MODE
        sync: false
      - key: REGISTRATION_INVITE_CODE
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
  - type: web
    name: student-digital-guardian-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        sync: false
